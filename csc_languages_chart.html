<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Languages Spoken</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f7f4ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
  .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); padding: 36px; max-width: 900px; width: 100%; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 28px; font-weight: 300; }
  .chart-layout { display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; }
  .chart-wrap { flex: 0 0 300px; max-width: 300px; }
  .legend { flex: 1; min-width: 200px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; align-content: start; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f0ede8; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 0.82rem; color: #333; font-weight: 500; flex: 1; }
  .legend-count { font-size: 0.82rem; color: #888; font-weight: 300; text-align: right; }
</style>
</head>
<body>
<div class="container">
  <h1>CSC Languages Spoken</h1>
  <p class="subtitle">55 total responses &middot; 7 languages</p>
  <div class="chart-layout">
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<script>
const data = [{"label": "English", "count": 29}, {"label": "Spanish", "count": 15}, {"label": "Other", "count": 4}, {"label": "French", "count": 3}, {"label": "German", "count": 2}, {"label": "Albanian", "count": 1}, {"label": "Italian", "count": 1}];
const total = data.reduce((s, d) => s + d.count, 0);
const colors = ["#e63946", "#f4a261", "#2a9d8f", "#457b9d", "#e9c46a", "#264653", "#a8dadc"];
const legend = document.getElementById('legend');
data.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${colors[i]}"></div><span class="legend-label">${d.label}</span><span class="legend-count">${d.count}</span>`;
  legend.appendChild(item);
});
new Chart(document.getElementById('chart'), {
  type: 'pie',
  data: {
    labels: data.map(d => d.label),
    datasets: [{ data: data.map(d => d.count), backgroundColor: colors, borderWidth: 1.5, borderColor: '#fff' }]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} (${((ctx.raw/total)*100).toFixed(1)}%)` } }
    }
  }
});
</script>
</body>
</html>
