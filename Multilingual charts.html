<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Languages Spoken by Housing Type</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f7f4ef;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    gap: 32px;
  }

  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    padding: 36px;
    max-width: 900px;
    width: 100%;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .chart-layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .chart-wrap {
    flex: 0 0 300px;
    max-width: 300px;
  }

  .legend {
    flex: 1;
    min-width: 220px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
    align-content: start;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #f0ede8;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 0.82rem;
    color: #333;
    font-weight: 500;
    flex: 1;
  }

  .legend-count {
    font-size: 0.82rem;
    color: #888;
    font-weight: 300;
    text-align: right;
  }
</style>
</head>
<body>

<script>
const COLORS = ['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a'];
const LABELS = ['1 language','2 languages','3 languages','4 languages','5 languages'];

function buildChart(containerId, title, subtitle, counts) {
  const container = document.getElementById(containerId);

  const h1 = document.createElement('h1');
  h1.textContent = title;
  container.appendChild(h1);

  const sub = document.createElement('p');
  sub.className = 'subtitle';
  sub.textContent = subtitle;
  container.appendChild(sub);

  const layout = document.createElement('div');
  layout.className = 'chart-layout';

  const chartWrap = document.createElement('div');
  chartWrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  chartWrap.appendChild(canvas);

  const legend = document.createElement('div');
  legend.className = 'legend';

  const total = counts.reduce((a, b) => a + b, 0);
  LABELS.forEach((label, i) => {
    const pct = ((counts[i] / total) * 100).toFixed(1);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-dot" style="background:${COLORS[i]}"></div>
      <span class="legend-label">${label}</span>
      <span class="legend-count">${counts[i]} &nbsp;<span style="color:#bbb">${pct}%</span></span>
    `;
    legend.appendChild(item);
  });

  layout.appendChild(chartWrap);
  layout.appendChild(legend);
  container.appendChild(layout);

  new Chart(canvas, {
    type: 'pie',
    data: {
      labels: LABELS,
      datasets: [{
        data: counts,
        backgroundColor: COLORS,
        borderWidth: 1.5,
        borderColor: '#fff'
      }]
    },
    options: {
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw} (${((ctx.raw / total) * 100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}
</script>

<div class="container" id="dorm"></div>
<div class="container" id="commuter"></div>
<div class="container" id="offcampus"></div>

<script>
buildChart('dorm',      'Dormers',                'n = 210 students', [79, 102, 26, 3, 0]);
buildChart('commuter',  'Commuters',              'n = 116 students', [17, 74, 18, 6, 1]);
buildChart('offcampus', 'Off-campus residents',   'n = 97 students',  [44, 40, 9, 1, 3]);
</script>

</body>
</html>
