<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; }
  .crop {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  iframe {
    width: 100%;
    height: calc(100vh + 120px); /* adjust 120px to how tall the toolbar is */
    border: none;
    margin-top: -120px; /* same number, hides the top toolbar */
  }
</style>
</head>
<body>
  <div class="crop">
    <iframe src="Language%20Map%20By%20Dorms%20%2B%20Commuter%20%2B%20Off-Campus.html"></iframe>
  </div>
</body>
</html>
