<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorm Languages Spoken</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f7f4ef;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    padding: 36px;
    max-width: 1000px;
    width: 100%;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .chart-layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .chart-wrap {
    flex: 0 0 340px;
    max-width: 340px;
  }

  .legend {
    flex: 1;
    min-width: 220px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
    align-content: start;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #f0ede8;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 0.82rem;
    color: #333;
    font-weight: 500;
    flex: 1;
  }

  .legend-count {
    font-size: 0.82rem;
    color: #888;
    font-weight: 300;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Dorm Languages Spoken</h1>
  <p class="subtitle">768 total responses · 44 languages</p>
  <div class="chart-layout">
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script>
const data = [
  { label: 'English', count: 422 },
  { label: 'Spanish', count: 130 },
  { label: 'Other', count: 56 },
  { label: 'French', count: 25 },
  { label: 'Italian', count: 17 },
  { label: 'Korean', count: 11 },
  { label: 'Bangla', count: 11 },
  { label: 'German', count: 10 },
  { label: 'Mandarin', count: 10 },
  { label: 'Greek', count: 8 },
  { label: 'Albanian', count: 8 },
  { label: 'Arabic', count: 7 },
  { label: 'Hindi', count: 6 },
  { label: 'Portuguese', count: 5 },
  { label: 'Japanese', count: 4 },
  { label: 'Polish', count: 3 },
  { label: 'Vietnamese', count: 3 },
  { label: 'ASL', count: 2 },
  { label: 'Creole', count: 2 },
  { label: 'Danish', count: 2 },
  { label: 'Tagalog', count: 2 },
  { label: 'Armenian', count: 1 },
  { label: 'Bambara', count: 1 },
  { label: 'Bulgarian', count: 1 },
  { label: 'Croatian', count: 1 },
  { label: 'Darija', count: 1 },
  { label: 'Fuzhounese', count: 1 },
  { label: 'Fulani', count: 1 },
  { label: 'Gujarati', count: 1 },
  { label: 'Hausa', count: 1 },
  { label: 'Hebrew', count: 1 },
  { label: 'Krio', count: 1 },
  { label: 'Latin', count: 1 },
  { label: 'Marathi', count: 1 },
  { label: 'Mongolian', count: 1 },
  { label: 'Nepali', count: 1 },
  { label: 'Persian', count: 1 },
  { label: 'Pig Latin', count: 1 },
  { label: 'Russian', count: 1 },
  { label: 'Soninke', count: 1 },
  { label: 'Swahili', count: 1 },
  { label: 'Telugu', count: 1 },
  { label: 'Twi', count: 1 },
  { label: 'Urdu', count: 1 },
];

const total = data.reduce((s, d) => s + d.count, 0);

const colors = [
  '#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#264653',
  '#a8dadc','#f77f00','#8ecae6','#023047','#219ebc','#c77dff',
  '#6a994e','#bc4749','#a7c957','#386641','#6c584c','#adc178',
  '#dde5b6','#ff9f1c','#cbf3f0','#2ec4b6','#ff6b6b','#ffd166',
  '#06d6a0','#118ab2','#073b4c','#ef476f','#b5838d','#6d6875',
  '#e2b4bd','#9a8c98','#c9ada7','#f2e9e4','#22223b','#4a4e69',
  '#9a8c98','#c9ada7','#f2e9e4','#ffb347','#87ceeb','#dda0dd',
  '#98fb98','#ffa07a'
];

const legend = document.getElementById('legend');
data.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <div class="legend-dot" style="background:${colors[i]}"></div>
    <span class="legend-label">${d.label}</span>
    <span class="legend-count">${d.count}</span>
  `;
  legend.appendChild(item);
});

new Chart(document.getElementById('chart'), {
  type: 'pie',
  data: {
    labels: data.map(d => d.label),
    datasets: [{
      data: data.map(d => d.count),
      backgroundColor: colors,
      borderWidth: 1.5,
      borderColor: '#fff'
    }]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.label}: ${ctx.raw} (${((ctx.raw/total)*100).toFixed(1)}%)`
        }
      }
    }
  }
});
</script>
</body>
</html>
